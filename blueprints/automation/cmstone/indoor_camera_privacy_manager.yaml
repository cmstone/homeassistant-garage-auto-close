blueprint:
  name: Indoor Camera Privacy Manager
  description: >
    Automatically manages privacy for an indoor camera. Privacy is enabled when
    someone is home and awake, disabled while everyone is away, and disabled
    while sleeping so the camera can record overnight. Sleep mode requires both
    a time window and at least one active sleep indicator, such as a white noise
    machine. Optional notifications can be sent for each privacy mode change,
    including the final privacy state and the trigger that caused the change.
  domain: automation

  input:
    presence_entities:
      name: Presence Entities
      description: People, device trackers, or binary sensors that indicate someone is home or present.
      selector:
        entity:
          multiple: true

    presence_mode:
      name: Presence Mode
      description: Choose whether one active presence entity is enough or all selected entities must be active.
      default: anyone_home
      selector:
        select:
          options:
            - label: Anyone home
              value: anyone_home
            - label: Everyone home
              value: everyone_home

    sleep_start:
      name: Sleep Start Time
      description: Start of the sleep window.
      default: "22:00:00"
      selector:
        time:

    sleep_end:
      name: Sleep End Time
      description: End of the sleep window.
      default: "07:00:00"
      selector:
        time:

    sleep_indicators:
      name: Sleep Indicator Entities
      description: White noise machine, sleep mode helper, bed sensor, bedroom fan, or similar. Sleep requires the time window and at least one of these entities to be active.
      default: []
      selector:
        entity:
          multiple: true

    privacy_enable_action:
      name: Enable Privacy Action
      description: Action to black out, cover, disable, or otherwise make the indoor camera private.
      selector:
        action:

    privacy_disable_action:
      name: Disable Privacy Action
      description: Action to uncover, enable, or otherwise make the indoor camera available for monitoring.
      selector:
        action:

    recording_enable_action:
      name: Enable Recording Action
      description: Optional action to enable recording, detections, or alerts.
      default: []
      selector:
        action:

    recording_disable_action:
      name: Disable Recording Action
      description: Optional action to disable recording, detections, or alerts.
      default: []
      selector:
        action:

    notification_action:
      name: Notification Action
      description: >
        Optional action sequence for notifications. The blueprint exposes
        notification_title, notification_message, notification_event,
        privacy_state, recording_state, trigger_reason, trigger_entity,
        trigger_name, trigger_from, trigger_to, and notification_timestamp
        variables before running this action.
      default: []
      selector:
        action:

    away_delay:
      name: Away Delay
      description: Wait this long after presence clears before disabling privacy.
      default:
        minutes: 2
      selector:
        duration:

    manual_override:
      name: Manual Override Helper
      description: Optional input_boolean. When on, this automation does nothing.
      default: ""
      selector:
        entity:
          domain: input_boolean

    guest_mode:
      name: Guest Mode Helper
      description: Optional input_boolean. When on, privacy always stays enabled.
      default: ""
      selector:
        entity:
          domain: input_boolean

    vacation_mode:
      name: Vacation Mode Helper
      description: Optional input_boolean. When on, privacy stays disabled and recording stays enabled.
      default: ""
      selector:
        entity:
          domain: input_boolean

mode: restart

trigger:
  - platform: state
    entity_id: !input presence_entities

  - platform: state
    entity_id: !input sleep_indicators

  - platform: time
    at: !input sleep_start

  - platform: time
    at: !input sleep_end

  - platform: state
    entity_id: !input guest_mode

  - platform: state
    entity_id: !input vacation_mode

  - platform: state
    entity_id: !input manual_override

  - platform: homeassistant
    event: start

variables:
  presence_entities: !input presence_entities
  presence_mode: !input presence_mode
  sleep_indicators: !input sleep_indicators
  sleep_start: !input sleep_start
  sleep_end: !input sleep_end
  manual_override: !input manual_override
  guest_mode: !input guest_mode
  vacation_mode: !input vacation_mode
  active_states:
    - "home"
    - "on"
    - "open"
    - "detected"
    - "occupied"
    - "true"
  active_presence_count: >
    {{ expand(presence_entities)
      | selectattr('state', 'in', active_states)
      | list
      | count }}
  total_presence_count: >
    {{ expand(presence_entities) | list | count }}
  someone_home: >
    {% if presence_mode == 'everyone_home' %}
      {{ total_presence_count > 0 and active_presence_count == total_presence_count }}
    {% else %}
      {{ active_presence_count > 0 }}
    {% endif %}
  in_sleep_window: >
    {% set current_time = now().strftime('%H:%M:%S') %}
    {% if sleep_start < sleep_end %}
      {{ sleep_start <= current_time < sleep_end }}
    {% else %}
      {{ current_time >= sleep_start or current_time < sleep_end }}
    {% endif %}
  sleep_indicator_active: >
    {{ sleep_indicators | count > 0 and expand(sleep_indicators)
      | selectattr('state', 'in', active_states)
      | list
      | count > 0 }}
  sleeping: >
    {{ in_sleep_window and sleep_indicator_active }}
  override_active: >
    {{ manual_override not in ['', none] and is_state(manual_override, 'on') }}
  guest_active: >
    {{ guest_mode not in ['', none] and is_state(guest_mode, 'on') }}
  vacation_active: >
    {{ vacation_mode not in ['', none] and is_state(vacation_mode, 'on') }}
  base_trigger_entity: >
    {{ trigger.entity_id if trigger is defined and trigger.entity_id is defined else '' }}
  base_trigger_name: >
    {% if trigger is defined and trigger.to_state is defined and trigger.to_state is not none %}
      {{ trigger.to_state.name }}
    {% elif trigger is defined and trigger.entity_id is defined %}
      {{ state_attr(trigger.entity_id, 'friendly_name') or trigger.entity_id }}
    {% elif trigger is defined and trigger.platform is defined %}
      {{ trigger.platform }}
    {% else %}
      Unknown
    {% endif %}
  base_trigger_from: >
    {{ trigger.from_state.state if trigger is defined and trigger.from_state is defined and trigger.from_state is not none else '' }}
  base_trigger_to: >
    {{ trigger.to_state.state if trigger is defined and trigger.to_state is defined and trigger.to_state is not none else '' }}
  base_notification_timestamp: >
    {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

condition:
  - condition: template
    value_template: "{{ not override_active }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ vacation_active }}"
        sequence:
          - choose: []
            default: !input privacy_disable_action
          - choose: []
            default: !input recording_enable_action
          - variables:
              notification_title: Indoor Camera Privacy
              notification_event: vacation_mode
              privacy_state: disabled
              recording_state: enabled
              trigger_reason: vacation_mode
              trigger_entity: "{{ base_trigger_entity }}"
              trigger_name: "{{ base_trigger_name }}"
              trigger_from: "{{ base_trigger_from }}"
              trigger_to: "{{ base_trigger_to }}"
              notification_timestamp: "{{ base_notification_timestamp }}"
              notification_message: >
                Privacy disabled and recording enabled because vacation mode is active.
                Trigger: {{ trigger_name }}{% if trigger_entity %} ({{ trigger_entity }}){% endif %}.
          - choose: []
            default: !input notification_action

      - conditions:
          - condition: template
            value_template: "{{ guest_active }}"
        sequence:
          - choose: []
            default: !input privacy_enable_action
          - choose: []
            default: !input recording_disable_action
          - variables:
              notification_title: Indoor Camera Privacy
              notification_event: guest_mode
              privacy_state: enabled
              recording_state: disabled
              trigger_reason: guest_mode
              trigger_entity: "{{ base_trigger_entity }}"
              trigger_name: "{{ base_trigger_name }}"
              trigger_from: "{{ base_trigger_from }}"
              trigger_to: "{{ base_trigger_to }}"
              notification_timestamp: "{{ base_notification_timestamp }}"
              notification_message: >
                Privacy enabled because guest mode is active.
                Trigger: {{ trigger_name }}{% if trigger_entity %} ({{ trigger_entity }}){% endif %}.
          - choose: []
            default: !input notification_action

      - conditions:
          - condition: template
            value_template: "{{ sleeping }}"
        sequence:
          - choose: []
            default: !input privacy_disable_action
          - choose: []
            default: !input recording_enable_action
          - variables:
              notification_title: Indoor Camera Privacy
              notification_event: sleeping
              privacy_state: disabled
              recording_state: enabled
              trigger_reason: sleep
              trigger_entity: "{{ base_trigger_entity }}"
              trigger_name: "{{ base_trigger_name }}"
              trigger_from: "{{ base_trigger_from }}"
              trigger_to: "{{ base_trigger_to }}"
              notification_timestamp: "{{ base_notification_timestamp }}"
              notification_message: >
                Privacy disabled and recording enabled because sleep mode is active.
                Trigger: {{ trigger_name }}{% if trigger_entity %} ({{ trigger_entity }}){% endif %}.
          - choose: []
            default: !input notification_action

      - conditions:
          - condition: template
            value_template: "{{ someone_home }}"
        sequence:
          - choose: []
            default: !input privacy_enable_action
          - choose: []
            default: !input recording_disable_action
          - variables:
              notification_title: Indoor Camera Privacy
              notification_event: home_awake
              privacy_state: enabled
              recording_state: disabled
              trigger_reason: presence
              trigger_entity: "{{ base_trigger_entity }}"
              trigger_name: "{{ base_trigger_name }}"
              trigger_from: "{{ base_trigger_from }}"
              trigger_to: "{{ base_trigger_to }}"
              notification_timestamp: "{{ base_notification_timestamp }}"
              notification_message: >
                Privacy enabled because someone is home and awake.
                Trigger: {{ trigger_name }}{% if trigger_entity %} ({{ trigger_entity }}){% endif %}.
          - choose: []
            default: !input notification_action

    default:
      - delay: !input away_delay
      - condition: template
        value_template: >
          {% set active_count = expand(presence_entities)
            | selectattr('state', 'in', active_states)
            | list
            | count %}
          {% set total_count = expand(presence_entities) | list | count %}
          {% if presence_mode == 'everyone_home' %}
            {{ not (total_count > 0 and active_count == total_count) }}
          {% else %}
            {{ active_count == 0 }}
          {% endif %}
      - choose: []
        default: !input privacy_disable_action
      - choose: []
        default: !input recording_enable_action
      - variables:
          notification_title: Indoor Camera Privacy
          notification_event: away
          privacy_state: disabled
          recording_state: enabled
          trigger_reason: away
          trigger_entity: "{{ base_trigger_entity }}"
          trigger_name: "{{ base_trigger_name }}"
          trigger_from: "{{ base_trigger_from }}"
          trigger_to: "{{ base_trigger_to }}"
          notification_timestamp: "{{ base_notification_timestamp }}"
          notification_message: >
            Privacy disabled and recording enabled because no selected presence entity is active.
            Trigger: {{ trigger_name }}{% if trigger_entity %} ({{ trigger_entity }}){% endif %}.
      - choose: []
        default: !input notification_action
